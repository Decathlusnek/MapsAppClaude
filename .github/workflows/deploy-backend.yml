name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  # ── Update these three values ────────────────────────────────────────
  GCP_PROJECT_ID:  mapsapp-route-optimizer        # your GCP project ID
  CLOUD_RUN_REGION: us-central1                   # Cloud Run region
  SERVICE_NAME:    route-optimizer-api             # Cloud Run service name
  # ────────────────────────────────────────────────────────────────────
  IMAGE_NAME: gcr.io/${{ vars.GCP_PROJECT_ID || 'mapsapp-route-optimizer' }}/route-optimizer-api

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1: PyTest
  # ────────────────────────────────────────────────────────────────────
  test:
    name: PyTest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Run PyTest
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Build Docker image & push to Google Container Registry
  #         then deploy to Cloud Run — only on push to main
  # ────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write   # required for google-github-actions/auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using a Service Account key stored
      # in GitHub Secrets (see README for how to create this).
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Configure Docker to use gcloud as a credential helper
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # Build the Docker image from the backend/ directory
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ./backend

      # Push both the commit-SHA tag and latest
      - name: Push Docker image to GCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # Deploy the new image to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region:  ${{ env.CLOUD_RUN_REGION }}
          image:   ${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --concurrency=10
            --min-instances=0
            --max-instances=5
            --timeout=60s
          env_vars: |
            PYTHONUNBUFFERED=1
            EXTRA_ALLOWED_ORIGINS=https://mapsapp-route-optimizer-8fe77.web.app,https://mapsapp-route-optimizer-8fe77.firebaseapp.com

      - name: Print deployed URL
        run: echo "Service deployed to ${{ steps.deploy.outputs.url }}"

      - name: Output Cloud Run URL (for updating script.js)
        run: |
          echo "::notice::Cloud Run URL: ${{ steps.deploy.outputs.url }}"
          echo "Update BACKEND_URL in frontend/script.js to: ${{ steps.deploy.outputs.url }}"
