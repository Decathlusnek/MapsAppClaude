name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1: Jest unit tests
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --ci --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to Firebase Hosting (only on push to main, not PRs)
  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation (future use)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAPSAPP }}
          projectId: mapsapp-route-optimizer
          channelId: live
          
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: meu-app-python-js
          region: us-central1
          source: ./
          flags: '--min-instances=0 --max-instances=5 --memory=512MiB --cpu=1 --no-cpu-throttling'
